<!-- === FRONTEND VERSION PANEL PATCH ===
     ADD these sections to the existing index.html frontend -->

<!-- 1. ADD THIS CSS inside <style> tag, before the closing </style> -->
<style>
    /* VERSION PANEL */
    #versionPanel {
      display: none;
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,193,7,0.03) 0%, transparent 100%);
      flex-shrink: 0;
      max-height: 140px;
      overflow-y: auto;
    }
    #versionPanel.active { display: block; }
    #versionPanel::-webkit-scrollbar { width: 3px; }
    #versionPanel::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px; }

    .version-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .version-header span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .version-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .version-item:hover {
      background: rgba(255,255,255,0.03);
      border-color: var(--border);
    }
    .version-item.current {
      background: var(--logic-glow);
      border-color: rgba(255,193,7,0.25);
      color: var(--logic);
    }
    .version-item .v-num {
      font-weight: 600;
      color: var(--logic);
      min-width: 24px;
    }
    .version-item .v-desc {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      font-size: 0.63rem;
    }
    .version-item .v-time {
      color: var(--text-muted);
      font-size: 0.58rem;
      flex-shrink: 0;
    }

    #versionToggle {
      padding: 4px 10px;
      border-radius: 7px;
      border: 1px solid rgba(255,193,7,0.25);
      background: var(--logic-glow);
      color: var(--logic);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      transition: all 0.2s;
      display: none;
    }
    #versionToggle.show { display: inline-flex; }
    #versionToggle:hover { background: rgba(255,193,7,0.15); }
</style>

<!-- 2. ADD THIS HTML after #adjustmentModeBar div -->
<div id="versionPanel">
  <div class="version-header">
    <span>Game Versions</span>
    <span id="versionCount">0 versions</span>
  </div>
  <div id="versionList"></div>
</div>

<!-- 3. ADD the version toggle button inside #links div, after #refreshLink -->
<a href="#" id="versionToggle" onclick="toggleVersionPanel(event)">⏱ Versions</a>

<!-- 4. ADD THIS JAVASCRIPT before the closing </script> tag -->
<script>
    var versionsLoaded = false;

    function toggleVersionPanel(e) {
      if (e) e.preventDefault();
      var panel = document.getElementById("versionPanel");
      if (panel.classList.contains("active")) {
        panel.classList.remove("active");
      } else {
        panel.classList.add("active");
        loadVersions();
      }
    }

    function loadVersions() {
      fetch(url + "/list_versions", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({session_id: session_id})
      }).then(function(r){return r.json();}).then(function(d){
        var list = document.getElementById("versionList");
        var countEl = document.getElementById("versionCount");
        list.innerHTML = "";
        var versions = d.versions || [];
        countEl.textContent = versions.length + " version" + (versions.length !== 1 ? "s" : "");
        if (versions.length === 0) {
          list.innerHTML = '<div style="color:var(--text-muted);font-size:0.65rem;padding:4px;">No versions yet</div>';
          return;
        }
        var currentV = d.current_version || 0;
        for (var i = versions.length - 1; i >= 0; i--) {
          var v = versions[i];
          var item = document.createElement("div");
          item.className = "version-item" + (v.version_num === currentV ? " current" : "");
          var ts = v.timestamp ? new Date(v.timestamp) : new Date();
          var timeStr = ts.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
          var dateStr = ts.toLocaleDateString([], {month:'short', day:'numeric'});
          item.innerHTML = '<span class="v-num">v' + v.version_num + '</span>' +
            '<span class="v-desc">' + (v.description || "—").substring(0, 50) + '</span>' +
            '<span class="v-time">' + dateStr + ' ' + timeStr + '</span>';
          item.setAttribute("data-vnum", v.version_num);
          item.onclick = function() {
            var vnum = parseInt(this.getAttribute("data-vnum"));
            revertToVersion(vnum);
          };
          list.appendChild(item);
        }
        versionsLoaded = true;
      }).catch(function(e){
        console.error("Failed to load versions:", e);
      });
    }

    function revertToVersion(vnum) {
      if (!confirm("Revert to version v" + vnum + "? Current state will be auto-saved first.")) return;
      addMsg("⏱ Reverting to v" + vnum + "...", "user");
      setBtns(true);
      fetch(url + "/revert_version", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({session_id: session_id, version_num: vnum})
      }).then(function(r){return r.json();}).then(function(d){
        setBtns(false);
        if (d.success) {
          addMsg("✅ " + d.message, "bot", true);
          loadVersions();
          if (currentGameLink) {
            var gu = url + currentGameLink + "?t=" + Date.now();
            if (gameWindow && !gameWindow.closed) { gameWindow.location.href = gu; gameWindow.focus(); }
            else gameWindow = window.open(gu, 'gameWindow_' + session_id);
          }
        } else {
          addMsg("✗ " + (d.message || "Revert failed"), "bot");
        }
      }).catch(function(){
        setBtns(false);
        addMsg("Connection error.", "bot");
      });
    }

    // Show version toggle when game exists
    var _origUpdateGameIndicator = updateGameIndicator;
    updateGameIndicator = function(exists, link) {
      _origUpdateGameIndicator(exists, link);
      if (exists) {
        document.getElementById("versionToggle").classList.add("show");
      }
    };
</script>
